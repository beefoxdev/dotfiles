##### tmux.conf — Ghostty (Wayland) + zsh friendly, hybrid TPM (TPM stowed, plugins per-machine) #####

##### PREFIX / INPUT #####

# More ergonomic prefix
set -g prefix C-Space
unbind C-Space
bind C-Space send-prefix

# Snappier ESC / vi-mode responsiveness
set -sg escape-time 10
set -g repeat-time 300

# Mouse support (great while learning)
set -g mouse on

##### COLORS / TERMINAL #####

# Use tmux's terminfo; Ghostty supports truecolor
set -g default-terminal "tmux-256color"

# Enable RGB (truecolor) broadly
set -as terminal-features ",*:RGB"

##### INDEXING / HISTORY #####

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000

##### SPLITS / NAVIGATION #####

# Intuitive split keys
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %
unbind C-j
unbind C-k

# Vim-like pane movement (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize without prefix (Alt + hjkl)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

##### COPY MODE (VI) + WAYLAND CLIPBOARD #####

setw -g mode-keys vi

# Enter copy mode: prefix + [
# Select: v
# Copy to system clipboard: y
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Paste tmux buffer
bind p paste-buffer

# Paste from Wayland system clipboard into the active pane
bind P run-shell "wl-paste | tmux load-buffer - && tmux paste-buffer"

##### QUALITY OF LIFE #####

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Keep window titles sensible
set -g set-titles on
set -g set-titles-string "#S:#I.#P - #{pane_current_command}"

# Quicker command prompt
bind : command-prompt

##### STATUS BAR (minimal) #####

set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[bold] #S #[default]"
set -g status-right "#(whoami)@#H  %Y-%m-%d %H:%M "

##### PLUGINS (TPM) #####
# Hybrid approach:
# - You stow/manage TPM at ~/.tmux/plugins/tpm
# - TPM installs the rest of the plugins per-machine into ~/.tmux/plugins/

# TPM itself (optional to list here, but harmless)
set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard / yanking improvements (Wayland)
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @override_copy_command 'wl-copy'
set -g @yank_selection 'clipboard'
set -g @yank_with_mouse on

# Useful pane/window helpers
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Optional: session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'
